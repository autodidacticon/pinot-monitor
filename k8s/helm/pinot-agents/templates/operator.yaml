apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinot-agents.fullname" . }}-operator
  labels:
    {{- include "pinot-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "pinot-agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "pinot-agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: {{ include "pinot-agents.fullname" . }}-operator
      containers:
        - name: operator
          image: {{ .Values.operator.image }}
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "start:operator"]
          ports:
            - name: http
              containerPort: {{ .Values.operator.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.operator.port | quote }}
            - name: TRUST_LEVEL
              value: {{ .Values.operator.trustLevel | quote }}
            - name: ALERT_WEBHOOK_URL
              value: {{ .Values.operator.alertWebhookUrl | quote }}
            - name: MONITOR_URL
              value: "http://{{ include "pinot-agents.fullname" . }}-monitor:{{ .Values.monitor.port }}"
            - name: MITIGATOR_URL
              value: "http://{{ include "pinot-agents.fullname" . }}-mitigator:{{ .Values.mitigator.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinot-agents.fullname" . }}-operator
  labels:
    {{- include "pinot-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.operator.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pinot-agents.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
