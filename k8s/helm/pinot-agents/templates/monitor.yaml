apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinot-agents.fullname" . }}-monitor
  labels:
    {{- include "pinot-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitor
spec:
  replicas: {{ .Values.monitor.replicas }}
  selector:
    matchLabels:
      {{- include "pinot-agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: monitor
  template:
    metadata:
      labels:
        {{- include "pinot-agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: monitor
    spec:
      serviceAccountName: {{ include "pinot-agents.fullname" . }}-monitor
      containers:
        - name: monitor
          image: {{ .Values.monitor.image }}
          imagePullPolicy: IfNotPresent
          command: ["npm", "start"]
          ports:
            - name: http
              containerPort: {{ .Values.monitor.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.monitor.port | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.monitor.llm.baseUrl | default .Values.global.llm.baseUrl | quote }}
            - name: LLM_MODEL
              value: {{ .Values.monitor.llm.model | default .Values.global.llm.model | quote }}
            - name: LLM_API_KEY
              value: {{ .Values.monitor.llm.apiKey | default .Values.global.llm.apiKey | quote }}
            - name: PINOT_MONITOR_CONTROLLER_HOST
              value: {{ .Values.global.pinot.controllerHost | quote }}
            - name: PINOT_MONITOR_CONTROLLER_PORT
              value: {{ .Values.global.pinot.controllerPort | quote }}
            - name: PINOT_MONITOR_BROKER_HOST
              value: {{ .Values.global.pinot.brokerHost | quote }}
            - name: PINOT_MONITOR_BROKER_PORT
              value: {{ .Values.global.pinot.brokerPort | quote }}
            - name: AGENT_MAX_TURNS
              value: {{ .Values.monitor.maxTurns | quote }}
            - name: SESSION_TTL_MS
              value: {{ .Values.monitor.sessionTtlMs | quote }}
            - name: OPERATOR_URL
              value: "http://{{ include "pinot-agents.fullname" . }}-operator:{{ .Values.operator.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.monitor.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinot-agents.fullname" . }}-monitor
  labels:
    {{- include "pinot-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitor
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.monitor.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pinot-agents.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: monitor
