apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinot-agents.fullname" . }}-mitigator
  labels:
    {{- include "pinot-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: mitigator
spec:
  replicas: {{ .Values.mitigator.replicas }}
  selector:
    matchLabels:
      {{- include "pinot-agents.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mitigator
  template:
    metadata:
      labels:
        {{- include "pinot-agents.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mitigator
    spec:
      serviceAccountName: {{ include "pinot-agents.fullname" . }}-mitigator
      containers:
        - name: mitigator
          image: {{ .Values.mitigator.image }}
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "start:mitigator"]
          ports:
            - name: http
              containerPort: {{ .Values.mitigator.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.mitigator.port | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.mitigator.llm.baseUrl | default .Values.global.llm.baseUrl | quote }}
            - name: LLM_MODEL
              value: {{ .Values.mitigator.llm.model | default .Values.global.llm.model | quote }}
            - name: LLM_API_KEY
              value: {{ .Values.mitigator.llm.apiKey | default .Values.global.llm.apiKey | quote }}
            - name: PINOT_MONITOR_CONTROLLER_HOST
              value: {{ .Values.global.pinot.controllerHost | quote }}
            - name: PINOT_MONITOR_CONTROLLER_PORT
              value: {{ .Values.global.pinot.controllerPort | quote }}
            - name: PINOT_MONITOR_BROKER_HOST
              value: {{ .Values.global.pinot.brokerHost | quote }}
            - name: PINOT_MONITOR_BROKER_PORT
              value: {{ .Values.global.pinot.brokerPort | quote }}
            - name: AGENT_MAX_TURNS
              value: {{ .Values.mitigator.maxTurns | quote }}
            - name: DRY_RUN
              value: {{ .Values.mitigator.dryRun | quote }}
            - name: MONITOR_URL
              value: "http://{{ include "pinot-agents.fullname" . }}-monitor:{{ .Values.monitor.port }}"
            - name: OPERATOR_URL
              value: "http://{{ include "pinot-agents.fullname" . }}-operator:{{ .Values.operator.port }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.mitigator.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinot-agents.fullname" . }}-mitigator
  labels:
    {{- include "pinot-agents.labels" . | nindent 4 }}
    app.kubernetes.io/component: mitigator
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.mitigator.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "pinot-agents.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mitigator
